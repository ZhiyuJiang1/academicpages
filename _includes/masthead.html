{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu masthead__menu--with-toggle">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
      <div class="masthead-theme-toggle">
        <button class="theme-toggle" type="button" aria-label="Toggle color theme" aria-pressed="false" data-active-theme="light">
          <span class="theme-toggle__icon theme-toggle__sun" aria-hidden="true">&#9728;</span>
          <span class="theme-toggle__icon theme-toggle__moon" aria-hidden="true">&#9790;</span>
        </button>
      </div>
    </div>
  </div>
</div>
